    server {
        listen 80;
        listen [::]:80; #若无 IPv6，此项可删除。
        return 301 https://$host$request_uri; #HTTP 自动跳转 HTTPS，让网站看起来更真实。
    }

    server {
        listen unix:/dev/shm/uds88888.sock ssl proxy_protocol default_server; #仅版本不小于 v1.25.1 才配置，否则必须删除。
        http2 on; #仅版本不小于 v1.25.1 才配置，否则必须删除。
        set_real_ip_from unix:;
        real_ip_header proxy_protocol;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_reject_handshake on; #版本不小于 v1.19.4 才支持
    } #限定域名连接（包括禁止以 IP 方式访问网站）

    server {
        listen 99999 quic reuseport; #仅版本不小于 v1.25.0 且 SSL 库支持 QUIC 才配置，否则必须删除。
        listen [::]:99999 quic reuseport; #仅版本不小于 v1.25.0 且 SSL 库支持 QUIC 才配置，否则必须删除。另外若无 IPv6，此项也可删除。
        listen unix:/dev/shm/uds88888.sock ssl proxy_protocol; #仅版本不小于 v1.25.1 才配置，否则必须删除。
        http2 on; #仅版本不小于 v1.25.1 才配置，否则必须删除。
        set_real_ip_from unix:;
        real_ip_header proxy_protocol;
        server_name h3a.example.com; #修改为自己的域名

        ssl_certificate /home/tls/cdn.example.com/h3a.example.com.crt; #修改为自己的证书，绝对路径。
        ssl_certificate_key /home/tls/cdn.example.com/h3a.example.com.key; #修改为自己的密钥，绝对路径。

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!PSK:!CBC:!DHE:!ADH:!kRSA:@STRENGTH; #若证书为 RSA 证书，所有 ECDSA 改为 RSA。
        ssl_prefer_server_ciphers on; #优先使用服务端的密码套件。（对如上 TLSv1.2 协议的密码套件有效）

        location /VLSpdG9k { #与 VLESS+XHTTP 应用中 path 对应
            grpc_pass grpc://unix:/dev/shm/uds2023.sock; #转发给本机 VLESS+XHTTP 监听进程
            grpc_set_header Host $host;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            add_header Alt-Svc 'h3=":99999"; ma=86400'; #通告 HTTP/3 server 的可用性
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always; #启用 HSTS
            root /var/www/html; #修改为自己存放的 Web 文件路径
            index index.html index.htm;
        }
    }
